<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 95vw;
            max-height: 98vh;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 5px;
        }

        .game-title {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #00b4d8, #48cae4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .score-container {
            display: flex;
            gap: 20px;
        }

        .score-box {
            text-align: center;
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
        }

        .score-value {
            font-size: 20px;
            font-weight: bold;
            color: #48cae4;
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        #gameCanvas {
            display: block;
            background: #0a0a1a;
            border: 2px solid rgba(72, 202, 228, 0.3);
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-title {
            font-size: 7vw;
            font-weight: bold;
            margin-bottom: 8px;
            color: #48cae4;
        }

        .overlay-subtitle {
            font-size: 3vw;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 16px;
            text-align: center;
            padding: 0 10px;
        }

        .overlay-score {
            font-size: 5vw;
            color: #ffd60a;
            margin-bottom: 16px;
        }

        .btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00b4d8, #48cae4);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 180, 216, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 0 5px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .controls-info {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .key {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-size: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-modes {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .mode-toggle input[type="checkbox"] {
            display: none;
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .mode-toggle input:checked + .toggle-switch {
            background: linear-gradient(45deg, #e94560, #ff6b6b);
        }

        .mode-toggle input:checked + .toggle-switch::after {
            left: 18px;
        }

        .mode-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
        }

        .mode-label.active {
            color: #ff6b6b;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .speed-control label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .speed-control select {
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }

        .speed-control select option {
            background: #1a1a2e;
            color: #fff;
        }

        /* 手机方向按钮 */
        .touch-controls {
            display: none;
            margin-top: 12px;
            padding: 0 5px;
        }

        .dpad {
            display: grid;
            grid-template-columns: 70px 70px 70px;
            grid-template-rows: 70px 70px 70px;
            gap: 4px;
            justify-content: center;
            margin: 0 auto;
            max-width: 230px;
        }

        .dpad-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .dpad-btn:active {
            background: rgba(72, 202, 228, 0.3);
            transform: scale(0.92);
            border-color: rgba(72, 202, 228, 0.5);
        }

        .dpad-btn.up { grid-column: 2; grid-row: 1; }
        .dpad-btn.left { grid-column: 1; grid-row: 2; }
        .dpad-btn.right { grid-column: 3; grid-row: 2; }
        .dpad-btn.down { grid-column: 2; grid-row: 3; }
        .dpad-btn.center {
            grid-column: 2;
            grid-row: 2;
            background: rgba(255, 255, 255, 0.05);
            font-size: 12px;
            border-color: rgba(255, 255, 255, 0.08);
        }
        .dpad-btn.center:active {
            background: rgba(255, 214, 10, 0.2);
            border-color: rgba(255, 214, 10, 0.4);
        }

        /* 响应式 */
        @media (max-width: 500px) {
            .game-container {
                padding: 12px;
                border-radius: 14px;
            }
            .game-title {
                font-size: 18px;
            }
            .score-value {
                font-size: 16px;
            }
            .controls-info {
                font-size: 10px;
                flex-wrap: wrap;
            }
            .touch-controls {
                display: block;
            }
            .dpad-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            .dpad {
                grid-template-columns: 60px 60px 60px;
                grid-template-rows: 60px 60px 60px;
                max-width: 200px;
            }
        }

        @media (max-width: 380px) {
            .game-container {
                padding: 8px;
            }
            .game-title {
                font-size: 15px;
            }
            .score-value {
                font-size: 14px;
            }
            .dpad-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            .dpad {
                grid-template-columns: 50px 50px 50px;
                grid-template-rows: 50px 50px 50px;
                max-width: 170px;
            }
        }

        @media (pointer: coarse) {
            .touch-controls {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">🐍 SNAKE</div>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Best</div>
                    <div class="score-value" id="bestScore">0</div>
                </div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="overlay" id="startOverlay">
                <div class="overlay-title">🐍 SNAKE</div>
                <div class="overlay-subtitle">Press SPACE or tap Start</div>
                <button class="btn btn-primary" id="startBtn">Start Game</button>
            </div>
            <div class="overlay hidden" id="gameOverOverlay">
                <div class="overlay-title">Game Over</div>
                <div class="overlay-score" id="finalScore">Score: 0</div>
                <button class="btn btn-primary" id="restartBtn">Play Again</button>
            </div>
        </div>

        <!-- 手机方向按钮 -->
        <div class="touch-controls" id="touchControls">
            <div class="dpad">
                <button class="dpad-btn up" data-dir="up">▲</button>
                <button class="dpad-btn left" data-dir="left">◀</button>
                <button class="dpad-btn center" data-dir="pause">⏸</button>
                <button class="dpad-btn right" data-dir="right">▶</button>
                <button class="dpad-btn down" data-dir="down">▼</button>
            </div>
        </div>

        <div class="game-footer">
            <div class="controls-info">
                <span><span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> Move</span>
                <span><span class="key">Space</span> Pause</span>
            </div>
            <div class="game-modes">
                <label class="mode-toggle" id="wallWrapToggle">
                    <input type="checkbox" id="wallWrapCheckbox">
                    <span class="toggle-switch"></span>
                    <span class="mode-label" id="wallWrapLabel">Wrap</span>
                </label>
                <div class="speed-control">
                    <label for="speedSelect">Speed:</label>
                    <select id="speedSelect">
                        <option value="150">Slow</option>
                        <option value="100" selected>Normal</option>
                        <option value="60">Fast</option>
                        <option value="35">Insane</option>
                    </select>
                </div>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const bestScoreElement = document.getElementById('bestScore');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreElement = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const speedSelect = document.getElementById('speedSelect');
        const wallWrapCheckbox = document.getElementById('wallWrapCheckbox');
        const wallWrapLabel = document.getElementById('wallWrapLabel');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;

        const FOOD_COUNT = 3;

        // Game state
        let snake = [];
        let foods = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('snakeBestScore')) || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop = null;
        let gameSpeed = 100;
        let wallWrapMode = false;

        // 初始化最佳分数显示
        bestScoreElement.textContent = bestScore;

        // 初始化蛇
        function initSnake() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
        }

        // 检查某个位置是否被蛇或已有食物占据
        function isOccupied(x, y) {
            if (snake.some(segment => segment.x === x && segment.y === y)) return true;
            if (foods.some(f => f.x === x && f.y === y)) return true;
            return false;
        }

        // 生成一个食物
        function generateOneFood() {
            const maxAttempts = 1000;
            for (let i = 0; i < maxAttempts; i++) {
                const x = Math.floor(Math.random() * GRID_SIZE);
                const y = Math.floor(Math.random() * GRID_SIZE);
                if (!isOccupied(x, y)) {
                    foods.push({ x, y });
                    return true;
                }
            }
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (!isOccupied(x, y)) {
                        foods.push({ x, y });
                        return true;
                    }
                }
            }
            if (snake.length >= GRID_SIZE * GRID_SIZE) {
                gameWin();
            }
            return false;
        }

        // 初始化所有食物
        function initFoods() {
            foods = [];
            for (let i = 0; i < FOOD_COUNT; i++) {
                if (!generateOneFood()) break;
            }
        }

        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                const padding = 1;
                const radius = 4;

                ctx.beginPath();
                ctx.roundRect(x + padding, y + padding, CELL_SIZE - padding * 2, CELL_SIZE - padding * 2, radius);

                if (index === 0) {
                    const gradient = ctx.createRadialGradient(
                        x + CELL_SIZE / 2, y + CELL_SIZE / 2, 0,
                        x + CELL_SIZE / 2, y + CELL_SIZE / 2, CELL_SIZE / 2
                    );
                    gradient.addColorStop(0, '#48cae4');
                    gradient.addColorStop(1, '#0077b6');
                    ctx.fillStyle = gradient;
                } else {
                    const ratio = index / snake.length;
                    const g = Math.round(180 + ratio * 30);
                    const b = Math.round(230 - ratio * 80);
                    ctx.fillStyle = `rgb(0, ${g}, ${b})`;
                }
                ctx.fill();

                // 蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    let eye1X, eye1Y, eye2X, eye2Y;

                    if (direction.x === 1) {
                        eye1X = x + CELL_SIZE - 6; eye1Y = y + 5;
                        eye2X = x + CELL_SIZE - 6; eye2Y = y + CELL_SIZE - 5;
                    } else if (direction.x === -1) {
                        eye1X = x + 6; eye1Y = y + 5;
                        eye2X = x + 6; eye2Y = y + CELL_SIZE - 5;
                    } else if (direction.y === -1) {
                        eye1X = x + 5; eye1Y = y + 6;
                        eye2X = x + CELL_SIZE - 5; eye2Y = y + 6;
                    } else {
                        eye1X = x + 5; eye1Y = y + CELL_SIZE - 6;
                        eye2X = x + CELL_SIZE - 5; eye2Y = y + CELL_SIZE - 6;
                    }

                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // 绘制所有食物
            const pulse = Math.sin(Date.now() / 200) * 0.1 + 0.9;
            foods.forEach((food) => {
                const fx = food.x * CELL_SIZE;
                const fy = food.y * CELL_SIZE;

                const glow = ctx.createRadialGradient(
                    fx + CELL_SIZE / 2, fy + CELL_SIZE / 2, 0,
                    fx + CELL_SIZE / 2, fy + CELL_SIZE / 2, CELL_SIZE
                );
                glow.addColorStop(0, 'rgba(255, 214, 10, 0.4)');
                glow.addColorStop(1, 'rgba(255, 214, 10, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(fx - CELL_SIZE / 2, fy - CELL_SIZE / 2, CELL_SIZE * 2, CELL_SIZE * 2);

                const foodPadding = (CELL_SIZE - CELL_SIZE * 0.7 * pulse) / 2;
                ctx.beginPath();
                ctx.roundRect(fx + foodPadding, fy + foodPadding, CELL_SIZE * 0.7 * pulse, CELL_SIZE * 0.7 * pulse, 6);
                const foodGradient = ctx.createRadialGradient(
                    fx + CELL_SIZE / 2, fy + CELL_SIZE / 2, 0,
                    fx + CELL_SIZE / 2, fy + CELL_SIZE / 2, CELL_SIZE / 2
                );
                foodGradient.addColorStop(0, '#ffd60a');
                foodGradient.addColorStop(1, '#ff9e00');
                ctx.fillStyle = foodGradient;
                ctx.fill();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(fx + CELL_SIZE * 0.35, fy + CELL_SIZE * 0.35, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // roundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // 更新游戏状态
        function update() {
            direction = { ...nextDirection };

            let head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (wallWrapMode) {
                if (head.x < 0) head.x = GRID_SIZE - 1;
                else if (head.x >= GRID_SIZE) head.x = 0;
                if (head.y < 0) head.y = GRID_SIZE - 1;
                else if (head.y >= GRID_SIZE) head.y = 0;
            } else {
                if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                    gameOver();
                    return;
                }
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            let ateFood = false;
            for (let i = foods.length - 1; i >= 0; i--) {
                if (head.x === foods[i].x && head.y === foods[i].y) {
                    foods.splice(i, 1);
                    ateFood = true;
                    score += 10;
                    scoreElement.textContent = score;
                    generateOneFood();
                    break;
                }
            }

            if (!ateFood) {
                snake.pop();
            }
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);

            if (score > bestScore) {
                bestScore = score;
                bestScoreElement.textContent = bestScore;
                localStorage.setItem('snakeBestScore', bestScore);
            }

            finalScoreElement.textContent = `Score: ${score}`;
            gameOverOverlay.classList.remove('hidden');
        }

        // 胜利
        function gameWin() {
            gameRunning = false;
            clearInterval(gameLoop);

            if (score > bestScore) {
                bestScore = score;
                bestScoreElement.textContent = bestScore;
                localStorage.setItem('snakeBestScore', bestScore);
            }

            finalScoreElement.textContent = `🏆 You Win! Score: ${score}`;
            gameOverOverlay.classList.remove('hidden');
        }

        // 开始游戏
        function startGame() {
            initSnake();
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreElement.textContent = '0';
            gamePaused = false;

            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');

            initFoods();
            draw();

            if (gameLoop) clearInterval(gameLoop);
            gameRunning = true;
            gameLoop = setInterval(() => {
                if (!gamePaused) {
                    update();
                    draw();
                }
            }, gameSpeed);
        }

        // 暂停/继续
        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            if (gamePaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#48cae4';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
                ctx.font = '16px Arial';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fillText('Press SPACE to continue', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        // 设置方向（供触屏和键盘共用）
        function setDirection(dx, dy) {
            if (!gameRunning || gamePaused) return;
            if (direction.x !== -dx || direction.y !== -dy) {
                nextDirection = { x: dx, y: dy };
            }
        }

        // 速度变更
        speedSelect.addEventListener('change', () => {
            gameSpeed = parseInt(speedSelect.value);
            if (gameRunning) {
                clearInterval(gameLoop);
                gameLoop = setInterval(() => {
                    if (!gamePaused) {
                        update();
                        draw();
                    }
                }, gameSpeed);
            }
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            const key = e.key;

            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
                e.preventDefault();
            }

            if (key === ' ') {
                if (!gameRunning && gameOverOverlay.classList.contains('hidden')) {
                    startGame();
                } else if (gameRunning) {
                    togglePause();
                }
                return;
            }

            if (!gameRunning || gamePaused) return;

            switch (key) {
                case 'ArrowUp': setDirection(0, -1); break;
                case 'ArrowDown': setDirection(0, 1); break;
                case 'ArrowLeft': setDirection(-1, 0); break;
                case 'ArrowRight': setDirection(1, 0); break;
            }
        });

        // 触屏方向按钮
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const dir = btn.dataset.dir;
                switch (dir) {
                    case 'up': setDirection(0, -1); break;
                    case 'down': setDirection(0, 1); break;
                    case 'left': setDirection(-1, 0); break;
                    case 'right': setDirection(1, 0); break;
                    case 'pause':
                        if (!gameRunning && gameOverOverlay.classList.contains('hidden')) {
                            startGame();
                        } else if (gameRunning) {
                            togglePause();
                        }
                        break;
                }
            });

            // 阻止长按菜单
            btn.addEventListener('contextmenu', (e) => e.preventDefault());
        });

        // 触屏滑动控制
        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!touchStartX || !touchStartY) return;
            const touch = e.changedTouches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) < 20) {
                // 轻触 = 开始/暂停
                if (!gameRunning && gameOverOverlay.classList.contains('hidden')) {
                    startGame();
                } else if (gameRunning) {
                    togglePause();
                }
                return;
            }

            if (absDx > absDy) {
                setDirection(dx > 0 ? 1 : -1, 0);
            } else {
                setDirection(0, dy > 0 ? 1 : -1);
            }

            touchStartX = 0;
            touchStartY = 0;
        }, { passive: false });

        // 穿墙模式切换
        wallWrapCheckbox.addEventListener('change', () => {
            wallWrapMode = wallWrapCheckbox.checked;
            if (wallWrapMode) {
                wallWrapLabel.classList.add('active');
            } else {
                wallWrapLabel.classList.remove('active');
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 初始绘制
        initSnake();
        initFoods();
        draw();
    </script>
</body>
</html>
