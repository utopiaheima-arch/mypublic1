<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .game-title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #00b4d8, #48cae4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .score-container {
            display: flex;
            gap: 30px;
        }

        .score-box {
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #48cae4;
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        #gameCanvas {
            display: block;
            background: #0a0a1a;
            border: 2px solid rgba(72, 202, 228, 0.3);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #48cae4;
        }

        .overlay-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }

        .overlay-score {
            font-size: 20px;
            color: #ffd60a;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 40px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00b4d8, #48cae4);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 180, 216, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 10px;
        }

        .controls-info {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        .key {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-modes {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .mode-toggle input[type="checkbox"] {
            display: none;
        }

        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 11px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .mode-toggle input:checked + .toggle-switch {
            background: linear-gradient(45deg, #e94560, #ff6b6b);
        }

        .mode-toggle input:checked + .toggle-switch::after {
            left: 20px;
        }

        .mode-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
        }

        .mode-label.active {
            color: #ff6b6b;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .speed-control label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .speed-control select {
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .speed-control select option {
            background: #1a1a2e;
            color: #fff;
        }


        @media (max-width: 500px) {
            .game-container {
                padding: 15px;
            }
            .game-title {
                font-size: 20px;
            }
            .score-value {
                font-size: 18px;
            }
            .controls-info {
                font-size: 11px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">🐍 SNAKE</div>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Best</div>
                    <div class="score-value" id="bestScore">0</div>
                </div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="overlay" id="startOverlay">
                <div class="overlay-title">🐍 SNAKE</div>
                <div class="overlay-subtitle">Press SPACE or click Start to play</div>
                <button class="btn btn-primary" id="startBtn">Start Game</button>
            </div>
            <div class="overlay hidden" id="gameOverOverlay">
                <div class="overlay-title">Game Over</div>
                <div class="overlay-score" id="finalScore">Score: 0</div>
                <button class="btn btn-primary" id="restartBtn">Play Again</button>
            </div>
        </div>

        <div class="game-footer">
            <div class="controls-info">
                <span><span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span> Move</span>
                <span><span class="key">Space</span> Pause</span>
            </div>
            <div class="game-modes">
                <label class="mode-toggle" id="wallWrapToggle">
                    <input type="checkbox" id="wallWrapCheckbox">
                    <span class="toggle-switch"></span>
                    <span class="mode-label" id="wallWrapLabel">Wrap Mode</span>
                </label>
                <div class="speed-control">
                    <label for="speedSelect">Speed:</label>
                    <select id="speedSelect">
                        <option value="150">Slow</option>
                        <option value="100" selected>Normal</option>
                        <option value="60">Fast</option>
                        <option value="35">Insane</option>
                    </select>
                </div>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const bestScoreElement = document.getElementById('bestScore');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreElement = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const speedSelect = document.getElementById('speedSelect');
        const wallWrapCheckbox = document.getElementById('wallWrapCheckbox');
        const wallWrapLabel = document.getElementById('wallWrapLabel');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;

        const FOOD_COUNT = 3; // 同时存在的食物数量

        // Game state
        let snake = [];
        let foods = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('snakeBestScore')) || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop = null;
        let gameSpeed = 100;
        let wallWrapMode = false;



        // 初始化最佳分数显示
        bestScoreElement.textContent = bestScore;

        // 初始化蛇
        function initSnake() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
        }

        // 检查某个位置是否被蛇或已有食物占据
        function isOccupied(x, y) {
            if (snake.some(segment => segment.x === x && segment.y === y)) return true;
            if (foods.some(f => f.x === x && f.y === y)) return true;
            return false;
        }

        // 生成一个食物（确保不在蛇身和其他食物上）
        function generateOneFood() {
            const maxAttempts = 1000;
            for (let i = 0; i < maxAttempts; i++) {
                const x = Math.floor(Math.random() * GRID_SIZE);
                const y = Math.floor(Math.random() * GRID_SIZE);
                if (!isOccupied(x, y)) {
                    foods.push({ x, y });
                    return true;
                }
            }
            // 兜底：遍历所有格子
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (!isOccupied(x, y)) {
                        foods.push({ x, y });
                        return true;
                    }
                }
            }
            // 没有空位了，检查是否胜利
            if (snake.length >= GRID_SIZE * GRID_SIZE) {
                gameWin();
            }
            return false;
        }

        // 初始化所有食物
        function initFoods() {
            foods = [];
            for (let i = 0; i < FOOD_COUNT; i++) {
                if (!generateOneFood()) break;
            }
        }


        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                const padding = 1;
                const radius = 4;

                ctx.beginPath();
                ctx.roundRect(x + padding, y + padding, CELL_SIZE - padding * 2, CELL_SIZE - padding * 2, radius);

                if (index === 0) {
                    // 蛇头 - 渐变
                    const gradient = ctx.createRadialGradient(
                        x + CELL_SIZE / 2, y + CELL_SIZE / 2, 0,
                        x + CELL_SIZE / 2, y + CELL_SIZE / 2, CELL_SIZE / 2
                    );
                    gradient.addColorStop(0, '#48cae4');
                    gradient.addColorStop(1, '#0077b6');
                    ctx.fillStyle = gradient;
                } else {
                    // 蛇身 - 从亮到暗渐变
                    const ratio = index / snake.length;
                    const r = Math.round(0 + ratio * 0);
                    const g = Math.round(180 + ratio * 30);
                    const b = Math.round(230 - ratio * 80);
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                }
                ctx.fill();

                // 蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    let eye1X, eye1Y, eye2X, eye2Y;

                    if (direction.x === 1) { // 向右
                        eye1X = x + CELL_SIZE - 6; eye1Y = y + 5;
                        eye2X = x + CELL_SIZE - 6; eye2Y = y + CELL_SIZE - 5;
                    } else if (direction.x === -1) { // 向左
                        eye1X = x + 6; eye1Y = y + 5;
                        eye2X = x + 6; eye2Y = y + CELL_SIZE - 5;
                    } else if (direction.y === -1) { // 向上
                        eye1X = x + 5; eye1Y = y + 6;
                        eye2X = x + CELL_SIZE - 5; eye2Y = y + 6;
                    } else { // 向下
                        eye1X = x + 5; eye1Y = y + CELL_SIZE - 6;
                        eye2X = x + CELL_SIZE - 5; eye2Y = y + CELL_SIZE - 6;
                    }

                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();

                    // 瞳孔
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // 绘制所有食物
            const pulse = Math.sin(Date.now() / 200) * 0.1 + 0.9;
            foods.forEach((food) => {
                const fx = food.x * CELL_SIZE;
                const fy = food.y * CELL_SIZE;

                // 发光效果
                const glow = ctx.createRadialGradient(
                    fx + CELL_SIZE / 2, fy + CELL_SIZE / 2, 0,
                    fx + CELL_SIZE / 2, fy + CELL_SIZE / 2, CELL_SIZE
                );
                glow.addColorStop(0, 'rgba(255, 214, 10, 0.4)');
                glow.addColorStop(1, 'rgba(255, 214, 10, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(fx - CELL_SIZE / 2, fy - CELL_SIZE / 2, CELL_SIZE * 2, CELL_SIZE * 2);

                // 食物本体
                const foodPadding = (CELL_SIZE - CELL_SIZE * 0.7 * pulse) / 2;
                ctx.beginPath();
                ctx.roundRect(fx + foodPadding, fy + foodPadding, CELL_SIZE * 0.7 * pulse, CELL_SIZE * 0.7 * pulse, 6);
                const foodGradient = ctx.createRadialGradient(
                    fx + CELL_SIZE / 2, fy + CELL_SIZE / 2, 0,
                    fx + CELL_SIZE / 2, fy + CELL_SIZE / 2, CELL_SIZE / 2
                );
                foodGradient.addColorStop(0, '#ffd60a');
                foodGradient.addColorStop(1, '#ff9e00');
                ctx.fillStyle = foodGradient;
                ctx.fill();

                // 食物高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(fx + CELL_SIZE * 0.35, fy + CELL_SIZE * 0.35, 3, 0, Math.PI * 2);
                ctx.fill();
            });

        }

        // roundRect polyfill for canvas
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // 更新游戏状态
        function update() {
            direction = { ...nextDirection };

            let head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (wallWrapMode) {
                // 穿墙模式：从一边穿到另一边
                if (head.x < 0) head.x = GRID_SIZE - 1;
                else if (head.x >= GRID_SIZE) head.x = 0;
                if (head.y < 0) head.y = GRID_SIZE - 1;
                else if (head.y >= GRID_SIZE) head.y = 0;
            } else {
                // 经典模式：撞墙即死
                if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                    gameOver();
                    return;
                }
            }

            // 检查自身碰撞
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物（遍历所有食物）
            let ateFood = false;
            for (let i = foods.length - 1; i >= 0; i--) {
                if (head.x === foods[i].x && head.y === foods[i].y) {
                    foods.splice(i, 1);
                    ateFood = true;
                    score += 10;
                    scoreElement.textContent = score;
                    // 立即补充一个食物
                    generateOneFood();
                    break;
                }
            }

            if (!ateFood) {
                snake.pop();
            }

        }


        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);

            if (score > bestScore) {
                bestScore = score;
                bestScoreElement.textContent = bestScore;
                localStorage.setItem('snakeBestScore', bestScore);
            }

            finalScoreElement.textContent = `Score: ${score}`;
            gameOverOverlay.classList.remove('hidden');
        }

        // 胜利（蛇填满整个网格）
        function gameWin() {
            gameRunning = false;
            clearInterval(gameLoop);

            if (score > bestScore) {
                bestScore = score;
                bestScoreElement.textContent = bestScore;
                localStorage.setItem('snakeBestScore', bestScore);
            }

            finalScoreElement.textContent = `🏆 You Win! Score: ${score}`;
            gameOverOverlay.classList.remove('hidden');
        }

        // 开始游戏
        function startGame() {
            initSnake();
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreElement.textContent = '0';
            gamePaused = false;

            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');

            initFoods();
            draw();


            if (gameLoop) clearInterval(gameLoop);
            gameRunning = true;
            gameLoop = setInterval(() => {
                if (!gamePaused) {
                    update();
                    draw();
                }
            }, gameSpeed);
        }

        // 暂停/继续
        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            if (gamePaused) {
                // 显示暂停文字
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#48cae4';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
                ctx.font = '16px Arial';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fillText('Press SPACE to continue', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        // 速度变更
        speedSelect.addEventListener('change', () => {
            gameSpeed = parseInt(speedSelect.value);
            if (gameRunning) {
                clearInterval(gameLoop);
                gameLoop = setInterval(() => {
                    if (!gamePaused) {
                        update();
                        draw();
                    }
                }, gameSpeed);
            }
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            const key = e.key;

            // 防止页面滚动
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
                e.preventDefault();
            }

            if (key === ' ') {
                if (!gameRunning && gameOverOverlay.classList.contains('hidden')) {
                    startGame();
                } else if (gameRunning) {
                    togglePause();
                }
                return;
            }

            if (!gameRunning || gamePaused) return;

            switch (key) {
                case 'ArrowUp':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // 穿墙模式切换
        wallWrapCheckbox.addEventListener('change', () => {
            wallWrapMode = wallWrapCheckbox.checked;
            if (wallWrapMode) {
                wallWrapLabel.classList.add('active');
            } else {
                wallWrapLabel.classList.remove('active');
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 初始绘制
        initSnake();
        initFoods();
        draw();


    </script>
</body>
</html>
